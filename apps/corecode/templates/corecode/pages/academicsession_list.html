{% extends "base.html" %}

{% block title %}Redirecting...{% endblock %}

{% block content %}
<div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="bg-light-card dark:bg-dark-card rounded-lg shadow-sm border border-light-border dark:border-dark-border p-12 text-center">
        <div class="text-6xl mb-4">🔄</div>
        <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100 mb-4">Redirecting to Sessions</h1>
        <p class="text-gray-600 dark:text-gray-400 mb-6">
            The academic session list has moved to a new URL.
        </p>
        <a href="{% url 'corecode:session_list' %}" 
           class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-md text-white bg-primary-600 hover:bg-primary-700">
            Go to Sessions →
        </a>
    </div>
</div>

<script>
    // Auto-redirect after 3 seconds
    setTimeout(function() {
        window.location.href = "{% url 'corecode:session_list' %}";
    }, 3000);
</script>
{% endblock %}
