{% load static %}
<a href="{% url url %}" class="group bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 p-4 hover:shadow-md transition-all">
    <div class="flex items-center justify-between">
        <div>
            <p class="text-sm text-gray-500 dark:text-gray-400">{{ label }}</p>
            <p class="text-2xl font-bold text-gray-900 dark:text-white mt-1">{{ value }}</p>
            <p class="text-xs text-gray-400 mt-2">{{ sub_text }}</p>
        </div>
        <div class="h-12 w-12 rounded-full bg-{{ color }}-100 dark:bg-{{ color }}-900/30 flex items-center justify-center group-hover:scale-110 transition-transform">
            <i class="fas {{ icon }} text-{{ color }}-600 dark:text-{{ color }}-400 text-xl"></i>
        </div>
    </div>
</a>
