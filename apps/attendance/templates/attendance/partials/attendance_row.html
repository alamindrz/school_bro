{% load attendance_tags %}

<tr id="record-{{ record.id }}" class="hover:bg-light-hover dark:hover:bg-dark-hover">
    <td class="px-6 py-4 whitespace-nowrap">
        <div class="text-sm font-medium text-gray-900 dark:text-gray-100">{{ student.full_name }}</div>
        <div class="text-xs text-gray-500 dark:text-gray-400">ID: {{ student.id }}</div>
    </td>
    <td class="px-6 py-4 whitespace-nowrap">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
            {% if record.status == 'present' %}bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200
            {% elif record.status == 'absent' %}bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200
            {% elif record.status == 'late' %}bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200
            {% elif record.status == 'excused' %}bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200
            {% elif record.status == 'sick' %}bg-orange-100 text-orange-800 dark:bg-orange-900 dark:text-orange-200
            {% else %}bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300
            {% endif %}">
            <i class="fas {{ record.status|status_icon }} mr-1"></i>
            {{ record.get_status_display }}
        </span>
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
        {% if record.check_in_time %}{{ record.check_in_time }}{% else %}-{% endif %}
    </td>
    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400">
        {{ record.remarks|default:"-" }}
    </td>
    {% if not register.is_closed %}
    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
        <button onclick="showEditModal({{ record.id }}, '{{ record.status }}', '{{ record.remarks|escapejs }}')" 
                class="text-primary-600 dark:text-primary-400 hover:text-primary-900 dark:hover:text-primary-300">
            <i class="fas fa-edit"></i>
        </button>
    </td>
    {% endif %}
</tr>
