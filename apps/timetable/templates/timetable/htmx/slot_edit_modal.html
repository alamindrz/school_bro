{# timetable/htmx/slot_edit_modal.html #}
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden" @click.outside="$dispatch('close-modal')">
    <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
        <h3 class="text-lg font-bold">{% if slot.teacher %}Edit Assignment{% else %}New Assignment{% endif %}</h3>
        <button @click="$dispatch('close-modal')" class="text-gray-400 hover:text-gray-600">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div class="p-6 space-y-4" x-data="{ freePeriod: {{ is_free_period|yesno:'true,false' }} }">
        <!-- Free Period Toggle -->
        <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-900/50 rounded-lg">
            <span class="text-sm font-medium">Mark as Free Period?</span>
            <button type="button" 
                    @click="freePeriod = !freePeriod"
                    hx-post="{% url 'timetable:htmx_slot_update' slot.id %}"
                    hx-vals='js:{is_free_period: freePeriod, teacher_id: "", subject_id: ""}'
                    hx-target="#slot-{{ timetable_id }}-{{ day.id }}-{{ period.id }}"
                    hx-swap="outerHTML"
                    hx-on::after-request="
                        if(event.detail.successful) {
                            $dispatch('close-modal');
                            $dispatch('slot-updated', { message: '✓ Free period set' });
                        }
                    "
                    class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors"
                    :class="freePeriod ? 'bg-primary-600' : 'bg-gray-200'">
                <span class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform"
                      :class="freePeriod ? 'translate-x-6' : 'translate-x-1'"></span>
            </button>
        </div>

        <!-- Teacher Selection (hidden for free period) -->
        <div x-show="!freePeriod">
            <label class="block text-sm font-medium mb-2">Assign Teacher</label>
            <select name="teacher_id" 
                    class="w-full rounded-lg border-gray-300 dark:bg-gray-700 dark:border-gray-600"
                    hx-get="{% url 'timetable:htmx_teacher_subjects' %}"
                    hx-trigger="change"
                    hx-target="#subject-selection-area"
                    hx-vals='js:{
                        teacher_id: event.target.value,
                        timetable_id: "{{ timetable_id }}", 
                        day_id: "{{ day.id }}", 
                        period_id: "{{ period.id }}", 
                        slot_id: "{{ slot.id }}"
                    }'>
                <option value="">Select a teacher...</option>
                {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" {% if slot.teacher_id == teacher.id %}selected{% endif %}>
                        {{ teacher.get_full_name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Subject Selection Area -->
        <div id="subject-selection-area" class="mt-4">
            <!-- HTMX will load subjects here -->
        </div>
    </div>

    <!-- Footer Actions -->
    <div class="px-6 py-4 bg-gray-50 dark:bg-gray-900/50 flex justify-between">
        {% if slot.teacher or slot.is_free_period %}
        <button hx-post="{% url 'timetable:htmx_slot_clear' slot.id %}"
                hx-confirm="Clear this slot?"
                hx-target="#slot-{{ timetable_id }}-{{ day.id }}-{{ period.id }}"
                hx-swap="outerHTML"
                hx-on::after-request="
                    if(event.detail.successful) {
                        $dispatch('close-modal');
                        $dispatch('slot-updated', { message: '✓ Slot cleared' });
                    }
                "
                class="text-red-600 text-sm font-medium hover:underline">
            <i class="fas fa-trash-alt mr-1"></i> Clear Slot
        </button>
        {% else %}
        <span></span>
        {% endif %}
        <button @click="$dispatch('close-modal')" class="text-gray-500 text-sm font-medium hover:text-gray-700">
            Cancel
        </button>
    </div>
</div>
