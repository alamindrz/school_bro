{# timetable/htmx/slot_edit_modal.html #}
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-xl overflow-hidden" 
     @click.outside="$dispatch('close-modal')"
     x-data="{ isFree: {{ slot.is_free_period|yesno:'true,false' }} }">
    
    <div class="px-6 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
        <h3 class="text-lg font-bold">
            <span x-show="!isFree">{% if slot.teacher %}Edit Assignment{% else %}New Assignment{% endif %}</span>
            <span x-show="isFree">Free Period</span>
        </h3>
        <button @click="$dispatch('close-modal')" class="text-gray-400 hover:text-gray-600">
            <i class="fas fa-times"></i>
        </button>
    </div>

    <div class="p-6 space-y-4">
        <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-900/50 rounded-lg">
            <span class="text-sm font-medium">Mark as Free Period?</span>
            <button type="button" 
                    @click="isFree = !isFree"
                    hx-post="{% url 'timetable:htmx_slot_update' slot.id %}"
                    hx-vals='js:{is_free_period: !isFree, teacher_id: "", subject_id: "", timetable_id: "{{ timetable_id }}", day_id: "{{ day.id }}", period_id: "{{ period.id }}"}'
                    hx-target="#slot-{{ timetable_id }}-{{ day.id }}-{{ period.id }}"
                    hx-swap="outerHTML"
                    hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                    hx-on::after-request="if(event.detail.successful) { $dispatch('close-modal'); }"
                    :class="isFree ? 'bg-primary-600' : 'bg-gray-200'"
                    class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full transition-colors duration-200 border-2 border-transparent">
                <span :class="isFree ? 'translate-x-5' : 'translate-x-0'" 
                      class="inline-block h-5 w-5 transform rounded-full bg-white transition duration-200 shadow"></span>
            </button>
        </div>

        <div x-show="!isFree" x-transition>
            <label class="block text-sm font-medium mb-2">Assign Teacher</label>
            <select name="teacher_id" 
                    class="w-full rounded-lg border-gray-300 dark:bg-gray-700 dark:border-gray-600"
                    hx-get="{% url 'timetable:htmx_teacher_subjects' %}"
                    hx-trigger="change"
                    hx-target="#subject-selection-area"
                    hx-vals='js:{
                        teacher_id: event.target.value,
                        timetable_id: "{{ timetable_id }}", 
                        day_id: "{{ day.id }}", 
                        period_id: "{{ period.id }}", 
                        slot_id: "{{ slot.id }}"
                    }'>
                <option value="">Select a teacher...</option>
                {% for teacher in teachers %}
                    <option value="{{ teacher.id }}" {% if slot.teacher_id == teacher.id %}selected{% endif %}>
                        {{ teacher.get_full_name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div id="subject-selection-area" class="mt-4" x-show="!isFree">
            {% if slot.teacher %}
                <div hx-get="{% url 'timetable:htmx_teacher_subjects' %}?teacher_id={{ slot.teacher_id }}&timetable_id={{ timetable_id }}&day_id={{ day.id }}&period_id={{ period.id }}&slot_id={{ slot.id }}" hx-trigger="load"></div>
            {% endif %}
        </div>
    </div>

    <div class="px-6 py-4 bg-gray-50 dark:bg-gray-900/50 flex justify-between">
        {% if slot.teacher or slot.is_free_period %}
        <button hx-post="{% url 'timetable:htmx_slot_clear' slot.id %}"
                hx-confirm="Clear this slot?"
                hx-target="#slot-{{ timetable_id }}-{{ day.id }}-{{ period.id }}"
                hx-swap="outerHTML"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-on::after-request="if(event.detail.successful) { $dispatch('close-modal'); }"
                class="text-red-600 text-sm font-medium hover:underline">
            <i class="fas fa-trash-alt mr-1"></i> Clear Slot
        </button>
        {% endif %}
        <button @click="$dispatch('close-modal')" class="text-gray-500 text-sm font-medium hover:text-gray-700">Cancel</button>
    </div>
</div>
