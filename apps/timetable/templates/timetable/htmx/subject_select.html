{# timetable/htmx/subject_select.html #}
<div>
    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
        <i class="fas fa-book-open mr-1 text-primary-500"></i> Select Subject
    </label>
    
    {% if subjects %}
    <div class="space-y-2">
        {% for subject in subjects %}
        <button type="button"
                hx-trigger="click"
                hx-post="{% url 'timetable:htmx_slot_update' slot_id %}"
                hx-vals='{"teacher_id": "{{ teacher_id }}", "subject_id": "{{ subject.id }}", "timetable_id": "{{ timetable_id }}", "day_id": "{{ day_id }}", "period_id": "{{ period_id }}", "is_free_period": "false"}'
                hx-target="#slot-{{ timetable_id }}-{{ day_id }}-{{ period_id }}"
                hx-swap="outerHTML"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                hx-on::after-request="if(event.detail.successful) { $dispatch('close-modal'); $dispatch('slot-updated'); }"
                class="w-full text-left p-3 rounded-lg border border-gray-200 dark:border-gray-700 hover:border-primary-500 hover:bg-primary-50 dark:hover:bg-primary-900/10 transition-all group cursor-pointer">
            <div class="flex items-center justify-between">
                <span class="flex items-center gap-2">
                    <i class="fas fa-book text-primary-500 text-sm"></i>
                    <span class="text-sm font-medium text-gray-900 dark:text-white">{{ subject.name }}</span>
                </span>
                <i class="fas fa-arrow-right text-gray-400 text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
            </div>
        </button>
        {% endfor %}
    </div>
    {% else %}
    <div class="p-4 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg">
        <p class="text-sm text-yellow-800 dark:text-yellow-200">
            <i class="fas fa-exclamation-triangle mr-2"></i> No qualified subjects found.
        </p>
        <a href="{% url 'staffs:subject_assignments' teacher_id %}" 
           class="text-xs text-primary-600 hover:underline mt-2 inline-block" target="_blank">
            Add Qualifications
        </a>
    </div>
    {% endif %}
</div>
