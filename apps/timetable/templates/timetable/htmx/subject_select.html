{# timetable/templates/timetable/htmx/subject_select.html #}
<div id="subject-select-wrapper" class="space-y-3">
    <label class="mb-2 block text-xs font-semibold uppercase tracking-[0.2em] text-slate-500 dark:text-slate-400">
        <i class="fas fa-book-open mr-1 text-primary-500"></i> Select Subject to Assign
    </label>

    {% if subjects %}
    <div class="grid grid-cols-1 gap-2">
        {% for item in subjects %}
        <form hx-post="{% url 'timetable:htmx_slot_update' slot_id %}"
              hx-target="#slot-{{ timetable_id }}-{{ day_id }}-{{ period_id }}"
              hx-swap="outerHTML"
              hx-on::after-request="if(event.detail.successful) { window.dispatchEvent(new CustomEvent('close-modal')); }">
            {% csrf_token %}
            <input type="hidden" name="teacher_id" value="{{ teacher_id }}">
            <input type="hidden" name="subject_id" value="{{ item.subject_id }}">
            <input type="hidden" name="is_free_period" value="false">
            <input type="hidden" name="room" value="{{ room|default:'' }}">
            <input type="hidden" name="timetable_id" value="{{ timetable_id }}">
            <input type="hidden" name="day_id" value="{{ day_id }}">
            <input type="hidden" name="period_id" value="{{ period_id }}">

            <button type="submit" class="group flex w-full cursor-pointer items-center justify-between rounded-2xl border border-slate-200 bg-white p-3 text-left transition hover:border-primary-500 hover:bg-primary-50 dark:border-slate-700 dark:bg-slate-900 dark:hover:bg-primary-900/10">
                <span class="flex items-center gap-3">
                    <span class="flex h-8 w-8 items-center justify-center rounded-xl bg-primary-50 text-xs font-bold uppercase text-primary-600 dark:bg-primary-900/20 dark:text-primary-400">
                        {{ item.subject_code|default:"SUB" }}
                    </span>
                    <div>
                        <span class="block text-sm font-semibold text-slate-900 dark:text-white">{{ item.subject_name }}</span>
                        {% if item.is_primary %}
                        <span class="mt-1 inline-flex rounded-full bg-emerald-100 px-2 py-0.5 text-[10px] font-medium text-emerald-800 dark:bg-emerald-900/30 dark:text-emerald-300">Primary Specialization</span>
                        {% endif %}
                    </div>
                </span>
                <i class="fas fa-chevron-right text-xs text-slate-400 transition-transform group-hover:translate-x-1"></i>
            </button>
        </form>
        {% endfor %}
    </div>
    {% else %}
    <div class="rounded-2xl border border-amber-200 bg-amber-50 p-4 text-center dark:border-amber-800/50 dark:bg-amber-900/10">
        <p class="text-sm text-amber-800 dark:text-amber-300">
            <i class="fas fa-exclamation-triangle mr-1"></i> No qualified subjects found for this teacher.
        </p>
    </div>
    {% endif %}
</div>
