{# timetable/htmx/slot_cell.html #}
<div id="slot-{{ slot.timetable_id }}-{{ day.id }}-{{ period.id }}"
     class="slot-cell relative group cursor-pointer transition-all duration-150 rounded-lg
            {% if slot.is_free_period %}
                bg-yellow-50 dark:bg-yellow-900/20 hover:bg-yellow-100 dark:hover:bg-yellow-900/30 border border-yellow-200 dark:border-yellow-800
            {% elif slot.teacher %}
                bg-green-50 dark:bg-green-900/20 hover:bg-green-100 dark:hover:bg-green-900/30 border border-green-200 dark:border-green-800
            {% else %}
                bg-gray-50 dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-700 border border-gray-200 dark:border-gray-700
            {% endif %}"
     hx-get="{% url 'timetable:htmx_slot_edit' slot.id %}?day={{ day.id }}&period={{ period.id }}&timetable_id={{ slot.timetable_id }}"
     hx-trigger="click"
     hx-target="#modal-content"
     hx-swap="innerHTML">
    
    {% if slot.is_free_period %}
        <div class="p-2 sm:p-3 text-center">
            <i class="fas fa-coffee text-yellow-500 text-lg sm:text-xl mb-1"></i>
            <p class="text-xs sm:text-sm text-yellow-700 dark:text-yellow-300 font-medium">Free Period</p>
        </div>
    {% elif slot.teacher %}
        <div class="p-2 sm:p-3">
            <p class="font-medium text-sm sm:text-base text-gray-900 dark:text-white truncate">
                {{ slot.subject.name|default:"—" }}
            </p>
            <p class="text-xs text-gray-600 dark:text-gray-400 truncate">
                {{ slot.teacher.get_full_name }}
            </p>
        </div>
    {% else %}
        <div class="p-2 sm:p-3 text-center">
            <i class="fas fa-plus-circle text-gray-400 group-hover:text-primary-500 transition-colors"></i>
        </div>
    {% endif %}
</div>
