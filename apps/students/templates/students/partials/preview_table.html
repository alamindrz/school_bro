{% load static %}

<div class="overflow-x-auto border border-gray-200 dark:border-gray-700 rounded-lg">
    <table class="min-w-full divide-y divide-gray-200 dark:divide-gray-700">
        <thead class="bg-gray-50 dark:bg-gray-800">
            <tr>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">#</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Name</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Class</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Gender</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">DOB</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Email</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Status</th>
                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">Action</th>
            </tr>
        </thead>
        <tbody class="bg-white dark:bg-gray-900 divide-y divide-gray-200 dark:divide-gray-700">
            <template x-for="row in paginatedData" :key="row.row_number">
                <tr :class="{ 
                    'bg-red-50 dark:bg-red-900/10': !row.valid,
                    'bg-yellow-50 dark:bg-yellow-900/10': row.valid && row.exists
                }">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="row.row_number"></td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="text-sm font-medium text-gray-900 dark:text-gray-100" 
                             x-text="(row.data.first_name || '') + ' ' + (row.data.last_name || '')"></div>
                        <div class="text-xs text-gray-500 dark:text-gray-400" x-text="row.data.middle_name"></div>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="row.data.current_class_name || row.data.current_class"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <span x-show="row.data.gender === 'M'" class="text-blue-600 dark:text-blue-400">
                            <i class="fas fa-mars mr-1"></i> Male
                        </span>
                        <span x-show="row.data.gender === 'F'" class="text-pink-600 dark:text-pink-400">
                            <i class="fas fa-venus mr-1"></i> Female
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="row.data.date_of_birth"></td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 dark:text-gray-400" x-text="row.data.email || '-'"></td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span x-show="row.valid && !row.exists" 
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200">
                            <i class="fas fa-plus-circle mr-1"></i> New
                        </span>
                        <span x-show="row.valid && row.exists" 
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 dark:bg-yellow-900 dark:text-yellow-200">
                            <i class="fas fa-sync-alt mr-1"></i> Update
                        </span>
                        <span x-show="!row.valid" 
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200">
                            <i class="fas fa-exclamation-triangle mr-1"></i> Invalid
                        </span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm">
                        <button x-show="!row.valid" 
                                @click="showErrorDetails(row)"
                                class="text-red-600 hover:text-red-900 dark:text-red-400 dark:hover:text-red-300">
                            <i class="fas fa-info-circle mr-1"></i> Details
                        </button>
                    </td>
                </tr>
            </template>
            
            <!-- Empty state -->
            <tr x-show="paginatedData.length === 0">
                <td colspan="8" class="px-6 py-12 text-center text-gray-500 dark:text-gray-400">
                    <i class="fas fa-database text-4xl mb-3"></i>
                    <p class="text-lg font-medium">No data to preview</p>
                    <p class="text-sm mt-1">Upload a CSV file to see preview</p>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<!-- Pagination -->
<div x-show="totalPages > 1" class="mt-4 flex items-center justify-between">
    <div class="flex-1 flex justify-between sm:hidden">
        <button @click="currentPage = Math.max(1, currentPage - 1)"
                :disabled="currentPage === 1"
                class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
            Previous
        </button>
        <span class="text-sm text-gray-700 dark:text-gray-300">
            Page <span x-text="currentPage"></span> of <span x-text="totalPages"></span>
        </span>
        <button @click="currentPage = Math.min(totalPages, currentPage + 1)"
                :disabled="currentPage === totalPages"
                class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
            Next
        </button>
    </div>
    <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
        <div>
            <p class="text-sm text-gray-700 dark:text-gray-300">
                Showing <span x-text="startIndex + 1"></span> to 
                <span x-text="endIndex"></span> of 
                <span x-text="previewData.length"></span> results
            </p>
        </div>
        <div>
            <nav class="relative z-0 inline-flex rounded-md shadow-sm -space-x-px" aria-label="Pagination">
                <button @click="currentPage = 1"
                        :disabled="currentPage === 1"
                        class="relative inline-flex items-center px-2 py-2 rounded-l-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="sr-only">First</span>
                    <i class="fas fa-angle-double-left"></i>
                </button>
                <button @click="currentPage = Math.max(1, currentPage - 1)"
                        :disabled="currentPage === 1"
                        class="relative inline-flex items-center px-2 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="sr-only">Previous</span>
                    <i class="fas fa-angle-left"></i>
                </button>
                
                <template x-for="page in displayedPages" :key="page">
                    <button @click="currentPage = page"
                            :class="{
                                'z-10 bg-primary-50 border-primary-500 text-primary-600': currentPage === page,
                                'bg-white border-gray-300 text-gray-500 hover:bg-gray-50': currentPage !== page
                            }"
                            class="relative inline-flex items-center px-4 py-2 border text-sm font-medium">
                        <span x-text="page"></span>
                    </button>
                </template>
                
                <button @click="currentPage = Math.min(totalPages, currentPage + 1)"
                        :disabled="currentPage === totalPages"
                        class="relative inline-flex items-center px-2 py-2 border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="sr-only">Next</span>
                    <i class="fas fa-angle-right"></i>
                </button>
                <button @click="currentPage = totalPages"
                        :disabled="currentPage === totalPages"
                        class="relative inline-flex items-center px-2 py-2 rounded-r-md border border-gray-300 bg-white text-sm font-medium text-gray-500 hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="sr-only">Last</span>
                    <i class="fas fa-angle-double-right"></i>
                </button>
            </nav>
        </div>
    </div>
</div>
