{% load static %}

<!-- Error Details Modal -->
<div x-show="showErrorModal" 
     class="fixed inset-0 z-50 overflow-y-auto"
     x-cloak>
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 transition-opacity" aria-hidden="true">
            <div class="absolute inset-0 bg-gray-500 dark:bg-gray-900 opacity-75"></div>
        </div>

        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <div class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
            <div class="bg-white dark:bg-gray-800 px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="sm:flex sm:items-start">
                    <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-red-100 dark:bg-red-900 sm:mx-0 sm:h-10 sm:w-10">
                        <i class="fas fa-exclamation-triangle text-red-600 dark:text-red-400"></i>
                    </div>
                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                        <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-gray-100">
                            Validation Error - Row <span x-text="selectedError?.row_number"></span>
                        </h3>
                        <div class="mt-2">
                            <p class="text-sm text-red-600 dark:text-red-400" x-text="selectedError?.error"></p>
                        </div>
                        
                        <!-- Row Data -->
                        <div class="mt-4">
                            <h4 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Row Data:</h4>
                            <div class="bg-gray-50 dark:bg-gray-900 rounded-md p-3 max-h-60 overflow-y-auto">
                                <template x-for="(value, key) in selectedError?.data" :key="key">
                                    <div class="flex py-1 border-b border-gray-200 dark:border-gray-700 last:border-0">
                                        <span class="text-xs font-medium text-gray-500 dark:text-gray-400 w-1/3" x-text="key.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase())"></span>
                                        <span class="text-xs text-gray-900 dark:text-gray-100 w-2/3" x-text="value || '-'"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="bg-gray-50 dark:bg-gray-700 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                <button type="button" 
                        @click="showErrorModal = false"
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                    Close
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Error Summary (shown when there are errors) -->
<div x-show="stats.invalid > 0" class="mt-6 bg-red-50 dark:bg-red-900/20 rounded-lg p-4">
    <div class="flex items-start">
        <div class="flex-shrink-0">
            <i class="fas fa-exclamation-triangle text-red-600 dark:text-red-400"></i>
        </div>
        <div class="ml-3 flex-1">
            <h4 class="text-sm font-medium text-red-800 dark:text-red-200">
                Found <span x-text="stats.invalid"></span> invalid record{{ stats.invalid|pluralize }}
            </h4>
            <div class="mt-2 max-h-40 overflow-y-auto">
                <div class="text-sm text-red-700 dark:text-red-300 space-y-1">
                    <template x-for="(row, index) in previewData.filter(r => !r.valid).slice(0, 5)" :key="index">
                        <div>
                            <strong>Row <span x-text="row.row_number"></span>:</strong> 
                            <span x-text="row.error"></span>
                            <button @click="showErrorDetails(row)" 
                                    class="ml-2 text-xs text-primary-600 dark:text-primary-400 hover:underline">
                                Details
                            </button>
                        </div>
                    </template>
                    <div x-show="previewData.filter(r => !r.valid).length > 5" 
                         class="text-sm text-gray-500 dark:text-gray-400 mt-2">
                        <i class="fas fa-ellipsis-h mr-2"></i>
                        And <span x-text="previewData.filter(r => !r.valid).length - 5"></span> more error{{ previewData.filter(r => !r.valid).length|pluralize }}...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
